<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      ul {list-style-type: none; padding: 0;}
      li {margin: 5px; 
         padding: 10px;
         border: 1px solid #ccc;
         cursor: pointer; 
         max-width: 30%;
      }
   </style>
</head>
<body>
    <ul id="myList">
      <li>Tutorial 1</li>
      <li>Tutorial 2</li>
      <li>Tutorial 3</li>
      <li>Tutorial 4</li>
      <li>Tutorial 5</li>
   </ul>
   <div id = "output"></div>
</body>
<script>
    let output=document.getElementById('mylist')
    let list=document.getElementById('myList')

    list.addEventListener('click',(event)=>{
        if(event.target.tagName==="LI"){
            output.innerHTML+="<br> tutorial clicked:"+event.target.textContent;
        }
    })
</script>
</html>
