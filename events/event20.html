<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="triggerBtn">Trigger Custom Event</button>
</body>
<script>
    const eventdata={message:'Hello from custom event'}
    const customevent=new CustomEvent('myevent',{detail:eventdata})

    document.getElementById('triggerBtn').addEventListener('click',()=>{
        document.dispatchEvent(customevent)
    })
    document.addEventListener('myevent',(event)=>{
        alert('custom event trigger with message:'+event.detail.message)
    })
</script>
</html>
