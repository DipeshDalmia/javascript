<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    var v="tutorialpoints"
    const event1=new Event('customevent1')
    const event2=new Event('customevent2')

    document.addEventListener('customevent1',()=>{
        alert('event1 triggered')
    })
    document.addEventListener('customevent2',()=>{
        alert('event 2 triggered')
    })
    if(v==='tutorialpoints')
    {
        document.dispatchEvent(event1)
    }
    else
    {
        document.dispatchEvent(event2)
    }
</script>
</html>
