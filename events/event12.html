<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            height: 2000px;
        }

        .resizeInfo {
            position: fixed;
            top: 10px;
            left: 10px;
            background-color: #fff;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="resizeInfo"></div>

    <script>
        window.addEventListener('load', () => {
            var initialsize =
                "Initial window size: " +
                window.innerWidth + ' x ' +
                window.innerHeight;

            document.getElementsByClassName('resizeInfo')[0].innerText = initialsize;
        });

        window.addEventListener('resize', function () {
            var newSizeInfo =
                'New window size: ' +
                window.innerWidth + ' x ' +
                window.innerHeight;

            document.getElementsByClassName('resizeInfo')[0].innerText = newSizeInfo;
        });
        window.addEventListener('scroll', function() {
         alert('You have scrolled on this page.');
      });
    </script>
</body>
</html>
