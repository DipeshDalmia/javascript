<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #parent {width: 700px; height: 50px; position: relative;background: yellow;}
    #child {width: 50px;height: 50px; position: absolute; background-color: red;}
  </style>
<body>
    <div id = "parent">
    <div id = "child"> </div>
  </div>
  <br>
  <button onclick = "startAnimation()"> Animate Div </button>
  <button onclick = "stopAnimation()"> Stop Animation </button>
</body>
<script>
    let animationId;
    let pos=0;
    function startAnimation(){
        let child=document.getElementById('child');
        function animationFrame()
        {
            if(pos<650){
            pos++
            child.style.left=pos+"px"
            animationId=requestAnimationFrame(animationFrame)
        }
        }
        animationFrame()
    }
    
    function stopAnimation(){
        if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }
</script>
</html>
