<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<style>
    #parent {
      width: 700px;
      height: 50px;
      position: relative;
      background: yellow;
    }
    #child {
      width: 50px;
      height: 50px;
      position: absolute;
      background-color: red;
    }
</style>
<body>
    <div id="parent">
        <div id="child">

        </div>
    </div>
    <br>
    <button onclick="startAnimation()">Animate div</button>
</body>
<script>
    function startAnimation(){
        const elem = document.getElementById("child");
        let pos=0;
        let id=setInterval(animate,5)
        function animate(){
            if(pos==350)
            {
                clearInterval(id)
            }
            else{
                pos++  
                elem.style.left=pos+"px"
            }
        }
    }
</script>
</html>
