<!DOCTYPE html>
<html>
<head>
    <title>calllback Example</title>
</head>
<body>
    <div class="demo"></div>

    <script>
        let output = document.getElementsByClassName('demo')[0];


        function multiply(a){
            let m=a*4;
            output.innerHTML+="output is:"+m+"<br>"
        }
        function sum(a,b,callback){
            let c=a+b
            callback(c)
        }
        sum(2,3,multiply)

        output.innerHTML += "<br>program ends";
    </script>
</body>
</html>
