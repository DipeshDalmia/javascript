<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise chaining</title>
</head>
<body>
    <div class="demo"></div>
</body>
    <script>
        let output=document.getElementsByClassName('demo')[0];
        function fetchData(){
            fetch('https://jsonplaceholder.typicode.com/todos/1')
            .then(res=>res.json())
            .then((data)=>{
                output.innerHTML+=JSON.stringify(data)
            })
        }
        fetchData()
    </script>
</html>
