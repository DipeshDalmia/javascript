<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
</head>
<body>
    <div class="demo"></div>
</body>
    <script>
        let output=document.getElementsByClassName('demo')[0];
        var num=10;
        let promise1=new Promise((resolve,reject)=>{
            if(num==20){
                resolve("number is 20")
            }
            else{
                reject("number is not 20")
            }
        })
        output.innerHTML+="wait for consuming the promise <br>"
        promise1.then(succfunc).catch(errfunc).finally(()=>{
            output.innerHTML+="<br>this block always run"
        });
        function succfunc(message){
            output.innerHTML+=message
        }
        function errfunc(message)
        {
            output.innerHTML+=message;
        }
    </script>
</html>
