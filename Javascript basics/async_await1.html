<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async/await</title>
</head>
<body>
    <div class="demo"></div>
</body>
    <script>
        let output=document.getElementsByClassName('demo')[0];
        async function getData(){
            try{
                let resoponse=await fetch('https://api.github.com/users')
                let data =await resoponse.json()
                output.innerHTML+=data[0].login
            }catch(err){
                output.innerHTML+=json.stringify(err)
            }
        }
        getData()
    </script>
</html>
